[pdf]
script=evince.py
[djvu]
redirect = pdf
[djv]
redirect = pdf
[ps]
redirect = pdf
[cbr]
redirect = pdf
[cbz]
redirect = pdf

[md]
script=markdown_webkit.py

[html]
script=webkit2gtk.py
[htm]
redirect = html
[xhtml]
redirect = html
[xhtm]
redirect = html
[mht]
redirect = html

[doc]
#debug=true
script = abiword.py
[docx]
redirect = doc
[rtf]
redirect = doc
[odt]
redirect = doc

[mid]
command=xterm -into $XID -e sh -c 'timidity -iT --loop "$FILE"'

[otf]
command=display -backdrop -foreground white -window $XID -window-group $XID "$FILE"
nospinner=true
[ttf]
redirect = otf
[pcx]
redirect = otf

[fb2]
command=fb2info.py $XID $FILE
exit_timeout=600
[fbd]
redirect = fb2
[fbz]
redirect = fb2
[application/x-zip-compressed-fb2]
redirect = fb2