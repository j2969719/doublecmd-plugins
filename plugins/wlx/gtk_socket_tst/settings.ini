# $FILE - input file
# $XID  - x window id
# [ext1] - mime or extension
# redirect = ext2 - use settings from another extension or mime
# insensitive = 1 - set insensitive state in quick view
# nospinner = 1 - dont show spinner animation
# exit_timeout = 700 - timeout for checking exit status (millisec)
# read_timeout = 700 - timeout for reading the response from the script stdout (script_ipc)
# debug = false - output to the terminal of messages sent to the script (script_ipc)
# command = cmd -window-id $XID -file $FILE
# or
# script = /path/to/script.py
# (script always runs with arguments $1 = xid and $2 = input file)
# or
# script_ipc = script.py
# (script_ipc communicates with the plugin via stdout/stdin)
#
#
# global options
[.]
# use libmagic to detect mime type
uselibmagic = false
# dont show spinner animation at all
nospinner = false
# timeout for checking exit status (millisec)
#exit_timeout = 700
debug_ui=false
debug=false

[mid]
command = xterm -into $XID -e sh -c 'timidity -iT --loop "$FILE"'
noquote = 1
[midi]
redirect = mid

[otf]
command = display -backdrop -foreground white -window $XID -window-group $XID "$FILE"
nospinner = 1
[ttf]
redirect = otf
[pcx]
redirect = otf

[csv]
script = $PLUG_DIR/scripts/third_party/csv-viewer/csv-viewer-plug
[tsv]
redirect = csv

[text/x-makefile]
# command = gvim --servername $XID --socketid $XID "$FILE" -R
script = gtksourceview.py
[lua]
redirect = text/x-makefile

[sqlite3]
script = sqlite_viewer_gtk3.py
[application/vnd.sqlite3]
redirect = sqlite3
[application/x-sqlite3]
redirect = sqlite3

[pdf]
# command = zathura --reparent=$XID "$FILE" --page=1
# insensitive = 1
#
# script = evince.py
script_ipc = evince_ipc.py
[djvu]
redirect = pdf
[djv]
redirect = pdf
[ps]
redirect = pdf
[cbr]
redirect = pdf
[cbz]
redirect = pdf

[html]
# command = surf -e $XID "$FILE"
# command = vimb -e $XID "$FILE"
# insensitive = 1
#
# script = webkit2gtk.sh
script_ipc = webkit2gtk_yoba.py
[htm]
redirect = html
[xhtml]
redirect = html
[xhtm]
redirect = html
[mht]
redirect = html

[md]
#script = markdown_webkit.py
redirect = html

[chm]
script_ipc = webkit2gtk_yoba.py

[epub]
# script_ipc = webkit2gtk_yoba.py
[ods]
# script_ipc = webkit2gtk_yoba.py

[doc]
# command = $PLUG_DIR/libreoffice_kostyl -w $XID -f "$FILE"
# script_ipc = abiword_ipc.py
# script_ipc = webkit2gtk_yoba.py
[docx]
redirect = doc
[rtf]
redirect = doc
[odt]
redirect = doc

[fb2]
# script_ipc = webkit2gtk_yoba.py
script = fb2info.py
exit_timeout = 700
[fbd]
script = fb2info.py
exit_timeout = 700
[fbz]
