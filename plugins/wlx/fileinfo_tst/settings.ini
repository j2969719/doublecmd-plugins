[.]
font=mono 13
show_cursor=0
pixels_above_lines=0
pixels_below_lines=0
#fallback_command=$PLUG_DIR/fileinfo.sh "$FILE"
use_enca=1

[vcard]
command=vcard_print.py "$file"
[vcf]
redirect = vcard

[application/x-dosexec]
command=dosexec.sh "$FILE"
[application/vnd.microsoft.portable-executable]
redirect=application/x-dosexec

[application/x-sharedlib]
script=sharedlib.sh "$FILE"
[application/x-executable]
redirect=application/x-sharedlib
[application/x-pie-executable]
redirect=application/x-sharedlib

[application/x-sqlite3]
command=sqlite3 "$FILE" .dbinfo .dump

[application/zip]
command=7z l "$FILE" || file -b "$FILE" && unzip -v "$FILE"
#mc_script=archive.sh
[zip]
redirect=application/zip

[inode/directory]
command=stat "$FILE"

[7z]
command=7za l "$FILE" 2>/dev/null || 7z l "$FILE"
[img]
redirect=7z
[ima]
redirect=7z
[vmdk]
redirect=7z

[ace]
command=file -b "$FILE" && unace v -y "$FILE" </dev/random

[alz]
command=file -b "$FILE" && unalz -l "$FILE"

[apk]
command=aapt dump badging "$FILE"

[arc]
command=file -b "$FILE" && arc l "$FILE"

[arj]
command=file -b "$FILE" ; arj l "$FILE" 2>/dev/null || unarj l "$FILE"

[cab]
command=file -b "$FILE" && cabextract -l "$FILE"

[cpio]
command=file -b "$FILE" && cpio -itv < "$FILE" 2>/dev/null

[crt]
command=keytool -printcert -v -file "$FILE" || openssl crl2pkcs7 -nocrl -certfile "$FILE" | openssl pkcs7 -print_certs -text
[cer]
redirect=crt
[pem]
redirect=crt

[csv]
command=cat "$FILE" | sed -e 's/,,/, ,/g' | column -s, -t

[deb]
command=dpkg-deb -I "$FILE" && echo && dpkg-deb -c "$FILE"
[ddeb]
redirect=deb

[djvu]
command=djvused -e print-pure-txt -u "$FILE"
[djv]
redirect=djvu

[docx]
script=docx.sh "$FILE"

[doc]
script=doc.sh "$FILE"

[rtf]
command=doc.sh "$FILE"

[dvi]
command=dvi.sh "$FILE"

[epub]
command=epub2txt -m "$FILE" | sed "s,\x1B\[[0-9;]*[a-zA-Z],,g" || einfo -v "$FILE"

[fb2]
command=ebook2text "$FILE" || xsltproc $PLUG_DIR/third_party/FB2_2_txt.xsl "$FILE"

[ha]
command=file -b "$FILE" && ha lf "$FILE"

[html]
command=links -dump "$FILE" 2>/dev/null || w3m -dump "$FILE" 2>/dev/null || lynx -dump "$FILE"
[htm]
redirect=html

[iso]
command=isoinfo -d -i "$FILE" && isoinfo -l -R -J -i "$FILE"

[lha]
command=file -b "$FILE" && lha l "$FILE"

[lz4]
command=file -b "$FILE" && lz4 -dc "$FILE" 2>/dev/null | tar -tvvf -

[lnk]
command=lnkinfo "$FILE" || exiftool "$FILE"

[mo]
command=file -b "$FILE" && msgunfmt "$FILE"

[msi]
command=file -b "$FILE" && msiinfo suminfo "$FILE" && msiextract -l "$FILE"

[odt]
command=odt2txt "$FILE"
[ods]
redirect=odt
[odp]
redirect=odt
[odg]
redirect=odt

[pdf]
command=pdftotext -layout -nopgbrk "$FILE" -

[ps]
command=ps2ascii "$FILE"

[rar]
command=file -b "$FILE" ; rar v -c- "$FILE" 2>/dev/null || unrar v -c- "$FILE"

[tar]
command=file -b "$FILE" && tar -tvf "$FILE"
#mc_script=archive.sh
[tgz]
redirect=tar
[txz]
redirect=tar
[tbz]
redirect=tar
[tlz]
redirect=tar
[gz]
redirect=tar
[xz]
redirect=tar
[bz2]
redirect=tar
[zst]
redirect=tar
[lzma]
redirect=tar

[torrent]
command=transmission-show "$FILE" || ctorrent -x "$FILE" || aria2c -S "$FILE"

[xls]
command=xls.sh "$FILE"
#mc_script=archive.sh
#mc_filetype=msxls

[xlsx]
command=xlsx2csv "$FILE" | sed -e 's/,,/, ,/g' | column -s, -t

[zoo]
command=file -b "$FILE" && zoo l "$FILE"

[zpaq]
command=file -b "$FILE" && zpaq l "$FILE"